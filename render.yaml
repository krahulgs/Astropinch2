services:
  # Backend API Service
  - type: web
    name: astropinch-api
    env: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r backend/requirements.txt --prefer-binary
    startCommand: cd backend && chmod +x pre-start.sh && ./pre-start.sh
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: astropinch-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://api.deepseek.com
      - key: CASHFREE_CLIENT_ID
        sync: false
      - key: CASHFREE_CLIENT_SECRET
        sync: false
      - key: CASHFREE_ENVIRONMENT
        value: SANDBOX
      - key: FRONTEND_URL
        fromService:
          name: astropinch-web
          type: web
          property: host
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: PYTHONPATH
        value: .

  # Frontend Next.js Service
  - type: web
    name: astropinch-web
    env: node
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: astropinch-api
          type: web
          property: host
      - key: NODE_VERSION
        value: 20.x

databases:
  - name: astropinch-db
    plan: free
